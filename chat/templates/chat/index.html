<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Global Chat Room</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #chat-log { width: 100%; max-width: 800px; padding: 10px; margin-bottom: 10px; }
        .input-area { display: flex; max-width: 820px; gap: 10px; }
        #chat-message-input { flex-grow: 1; padding: 10px; }
        #chat-message-submit { padding: 10px 20px; cursor: pointer; }
        .header { 
            display: flex; 
            justify-content: space-between; 
            max-width: 820px; 
            align-items: center; 
            border-bottom: 1px solid #ccc; 
            padding-bottom: 10px; 
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Global Chat Room</h2>
        <div>
            <span>Logged in as: <strong>{{ request.user.username }}</strong></span> | 
            <a href="/logout/">Logout</a>
        </div>
    </div>
    
    <textarea id="chat-log" cols="100" rows="20" readonly></textarea><br>
    
    <div class="input-area">
        <input id="chat-message-input" type="text" placeholder="Type your message here...">
        <input id="chat-message-submit" type="button" value="Send">
    </div>

    <script>
        // Connect to the WebSocket
        const chatSocket = new WebSocket(
            'ws://' + window.location.host + '/ws/socket-server/'
        );

        // Receive message from server and put it in the text area
        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            document.querySelector('#chat-log').value += (data.username + ': ' + data.message + '\n');
        };

        chatSocket.onclose = function(e) {
            console.error('Chat socket closed unexpectedly');
        };

        // Let the user press 'Enter' to send
        document.querySelector('#chat-message-input').onkeyup = function(e) {
            if (e.keyCode === 13) {  // enter, return
                document.querySelector('#chat-message-submit').click();
            }
        };

        // When the Send button is clicked
        document.querySelector('#chat-message-submit').onclick = function(e) {
            const messageInputDom = document.querySelector('#chat-message-input');
            const message = messageInputDom.value;
            
            if (message.trim() !== '') { // Prevent sending empty blank messages
                // Send to backend
                chatSocket.send(JSON.stringify({
                    'message': message
                }));
                
                // Clear the input box after sending
                messageInputDom.value = '';
            }
        };
    </script>
</body>
</html>
