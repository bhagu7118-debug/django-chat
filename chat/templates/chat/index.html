<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Chat Lobby - Select a Room</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .room-list { list-style: none; padding: 0; }
        .room-item { 
            padding: 15px; 
            background: #f9f9f9; 
            margin-bottom: 10px; 
            border-radius: 5px; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .room-item:hover { background: #eef2f3; }
        .join-btn { 
            background-color: #007bff; 
            color: white; 
            text-decoration: none; 
            padding: 8px 16px; 
            border-radius: 4px; 
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-link { color: #d9534f; text-decoration: none; font-size: 0.9em; }
        
        /* NEW: Styles for the room creation form */
        .create-form { display: flex; margin-bottom: 20px; gap: 10px; }
        .create-input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .create-btn { background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        .create-btn:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span>Hello, <strong>{{ request.user.username }}</strong></span>
            <a href="/logout/" class="logout-link">Logout</a>
        </div>
        
        <h2>Available Chat Rooms</h2>

<form method="post" action="." class="create-form">
    {% csrf_token %}
    <input type="text" name="room_name" class="create-input" placeholder="Create a new room..." required>
    <button type="submit" class="create-btn">+ Create</button>
</form>

        <ul class="room-list">
            {% for room in rooms %}
                <li class="room-item">
                    <span>{{ room.name }}</span>
                    <a href="{% url 'room' room.slug %}" class="join-btn">Join Room</a>
                </li>
            {% empty %}
                <p>No rooms found yet. Be the first to create one above!</p>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
