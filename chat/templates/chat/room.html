<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Chat Room: {{ room.name }}</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; display: flex; gap: 20px; height: 80vh; }
        .chat-section { flex: 3; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sidebar { flex: 1; background: #343a40; color: white; border-radius: 10px; padding: 20px; }
        
        #chat-log { flex-grow: 1; padding: 20px; overflow-y: auto; background: #e5ddd5; display: flex; flex-direction: column; gap: 10px; }
        .message { background: white; padding: 10px 15px; border-radius: 15px; max-width: 80%; align-self: flex-start; }
        .input-area { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; border-radius: 0 0 10px 10px; }
        #user-list { list-style: none; padding: 0; }
        .user-online { color: #28a745; margin-bottom: 5px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-section">
            <div id="chat-log">
                {% for m in messages %}
                   <div class="message {% if m.user == request.user %}sent{% else %}received{% endif %}">
                       <span class="message-user">{{ m.user.username }}</span>
                       {{ m.content }}
                   </div>
                {% endfor %}
                </div>
                
            <div class="input-area">
                <input id="chat-message-input" type="text" placeholder="Type a message..." autocomplete="off">
                <button id="chat-message-submit">Send</button>
            </div>
        </div>

        <div class="sidebar">
            <h3>Online Users</h3>
            <ul id="user-list"></ul>
        </div>
    </div>

    {{ room.slug|json_script:"room-name" }}
    {{ request.user.username|json_script:"user-name" }}

    <script>
        const roomName = JSON.parse(document.getElementById('room-name').textContent);
        const userName = JSON.parse(document.getElementById('user-name').textContent);
        const userList = {}; // To track online users locally

        const chatSocket = new WebSocket('ws://' + window.location.host + '/ws/chat/' + roomName + '/');

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);

            // Handle standard chat messages
            if (data.type === 'chat_message') {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message';
                messageDiv.innerHTML = `<strong>${data.username}</strong>: ${data.message}`;
                document.querySelector('#chat-log').appendChild(messageDiv);
                document.querySelector('#chat-log').scrollTop = document.querySelector('#chat-log').scrollHeight;
            } 
            
            // Handle Roll Call (User status updates)
            else if (data.type === 'user_status') {
                userList[data.username] = data.status;
                updateUserListUI();
            }

            // Handle List Requests (When a new person joins and asks "Who is here?")
            else if (data.type === 'user_list_request') {
                chatSocket.send(JSON.stringify({
                    'type': 'user_list_response'
                }));
            }
        };

        function updateUserListUI() {
            const listElement = document.querySelector('#user-list');
            listElement.innerHTML = '';
            for (const [user, status] of Object.entries(userList)) {
                if (status === 'online') {
                    const li = document.createElement('li');
                    li.className = 'user-online';
                    li.textContent = `● ${user}`;
                    listElement.appendChild(li);
                }
            }
        }

        document.querySelector('#chat-message-submit').onclick = function(e) {
            const inputDom = document.querySelector('#chat-message-input');
            chatSocket.send(JSON.stringify({
                'type': 'chat_message',
                'message': inputDom.value
            }));
            inputDom.value = '';
        };
    </script>
</body>
</html>
