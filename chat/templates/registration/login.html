<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Login - Chat App</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .brand-header { text-align: center; font-weight: bold; margin-bottom: 20px; color: #333; font-size: 1.5em; text-transform: uppercase; }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; text-align: center; color: #666; font-size: 1.2em; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; background-color: #007bff; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 20px; font-weight: bold; }
        .btn:hover { background-color: #0056b3; }
        .footer-link { margin-top: 20px; text-align: center; font-size: 0.9em; }
        .footer-link a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="brand-header">REAL TIME CHAT APPLICATION USING DJANGO.</h1>
        <h2>Welcome Back! Login</h2>
        
        <form method="post">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}

            <button type="submit" class="btn">Login</button>
        </form>
        
        <div class="footer-link">
            <p><a href="{% url 'password_reset' %}">Forgot your password?</a></p>
            <p>Don't have an account? <a href="{% url 'register' %}">Create one here</a></p>
        </div>
    </div>
</body>
</html>
