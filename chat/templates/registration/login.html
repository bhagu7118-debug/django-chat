<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Chat Lobby - Login</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        /* Style the Django-rendered inputs */
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .login-btn { width: 100%; background-color: #007bff; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .login-btn:hover { background-color: #0056b3; }
        .links { margin-top: 20px; text-align: center; font-size: 0.9em; display: flex; flex-direction: column; gap: 10px; }
        .links a { color: #007bff; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .error-msg { color: #d9534f; margin-bottom: 15px; text-align: center; background: #fdeaea; padding: 10px; border-radius: 4px; border: 1px solid #ebccd1; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login to Chat</h2>
        
        {% if form.errors %}
            <div class="error-msg">Your username and password didn't match. Please try again.</div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username:</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label for="id_password">Password:</label>
                {{ form.password }}
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="links">
            <a href="{% url 'register' %}">Don't have an account? Register here</a>
            <a href="{% url 'password_reset' %}">Forgot Password?</a>
        </div>
    </div>
</body>
</html>
