<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Register - Chat App</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; text-align: center; color: #333; }
        form p { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .reg-btn { width: 100%; background-color: #28a745; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .reg-btn:hover { background-color: #218838; }
        .helptext { display: block; font-size: 0.8em; color: #666; margin-top: 5px; }
        .footer-link { margin-top: 20px; text-align: center; font-size: 0.9em; }
        .footer-link a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create a New Account</h2>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="reg-btn">Register</button>
        </form>
        
        <div class="footer-link">
            <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>
        </div>
    </div>
</body>
</html>
